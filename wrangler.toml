name = "re-evolution-site"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext output directory
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# R2 — PDFs dos artigos do blog
[[r2_buckets]]
binding = "PDF_BUCKET"
bucket_name = "re-evolution-pdfs"

# Variáveis não sensíveis (públicas)
[vars]
R2_PDF_PUBLIC_URL = "https://pdfs.re-evolution.pt"

[env.production]
routes = [
  { pattern = "re-evolution.pt", custom_domain = true },
  { pattern = "www.re-evolution.pt", custom_domain = true },
]

# Todas as variáveis de ambiente sensíveis são geridas via GitHub Secrets e
# sincronizadas automaticamente para o Cloudflare em cada deploy
# (ver .github/workflows/deploy.yml).
# Para desenvolvimento local, usa .env.local (ver .env.local.example).
