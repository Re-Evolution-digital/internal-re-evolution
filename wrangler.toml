name = "re-evolution-site"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext output directory
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
INTENT_ALERTS_ENABLED = "false"

# Secrets (add via Cloudflare dashboard or: wrangler secret put SECRET_NAME):
# GROQ_API_KEY
# TELEGRAM_BOT_TOKEN
# TELEGRAM_CHAT_ID
# MAKE_DIAGNOSTICO_WEBHOOK
# GA_MEASUREMENT_ID
