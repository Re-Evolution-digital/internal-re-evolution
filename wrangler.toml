name = "re-evolution-site"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext output directory
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Todas as variáveis de ambiente são geridas via GitHub Secrets e sincronizadas
# automaticamente para o Cloudflare em cada deploy (ver .github/workflows/deploy.yml).
# Para desenvolvimento local, usa .env.local (ver .env.local.example).
