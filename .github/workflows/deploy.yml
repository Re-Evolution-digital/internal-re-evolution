name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npm run build:cf

      - name: Populate static assets cache (ISR pages → Assets)
        run: |
          mkdir -p .open-next/assets/cdn-cgi/_next_cache
          cp -r .open-next/cache/. .open-next/assets/cdn-cgi/_next_cache

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Sync all secrets to Cloudflare Workers
        # Corre após deploy para evitar conflito entre [vars] antigos e secrets novos
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.RESEND_API_KEY }}"           | npx wrangler secret put RESEND_API_KEY
          echo "${{ secrets.RESEND_FROM_EMAIL }}"        | npx wrangler secret put RESEND_FROM_EMAIL
          echo "${{ secrets.REEVO_EMAIL }}"              | npx wrangler secret put REEVO_EMAIL
          echo "${{ secrets.GROQ_API_KEY }}"             | npx wrangler secret put GROQ_API_KEY
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}"       | npx wrangler secret put TELEGRAM_BOT_TOKEN
          echo "${{ secrets.TELEGRAM_CHAT_ID }}"         | npx wrangler secret put TELEGRAM_CHAT_ID
          echo "${{ secrets.INTENT_ALERTS_ENABLED }}"    | npx wrangler secret put INTENT_ALERTS_ENABLED
          echo "${{ secrets.MAKE_DIAGNOSTICO_WEBHOOK }}" | npx wrangler secret put MAKE_DIAGNOSTICO_WEBHOOK
          echo "${{ secrets.GA_MEASUREMENT_ID }}"        | npx wrangler secret put GA_MEASUREMENT_ID
