name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npm run build:cf

      - name: Populate static assets cache (ISR pages → Assets)
        run: |
          mkdir -p .open-next/assets/cdn-cgi/_next_cache
          cp -r .open-next/cache/. .open-next/assets/cdn-cgi/_next_cache

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Sync all secrets to Cloudflare Workers
        # Corre após deploy para evitar conflito entre [vars] antigos e secrets novos.
        # put_secret: ignora segredos não definidos (valor vazio) e aguarda 1s entre
        # chamadas para evitar rate limiting da Cloudflare API.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          put_secret() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "⚠️  Skipping $name — not set in GitHub Secrets"
              return 0
            fi
            echo "$value" | npx wrangler secret put "$name"
            sleep 1
          }

          put_secret RESEND_API_KEY           "${{ secrets.RESEND_API_KEY }}"
          put_secret RESEND_FROM_EMAIL        "${{ secrets.RESEND_FROM_EMAIL }}"
          put_secret REEVO_EMAIL              "${{ secrets.REEVO_EMAIL }}"
          put_secret GROQ_API_KEY             "${{ secrets.GROQ_API_KEY }}"
          put_secret TELEGRAM_BOT_TOKEN       "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          put_secret TELEGRAM_CHAT_ID         "${{ secrets.TELEGRAM_CHAT_ID }}"
          put_secret INTENT_ALERTS_ENABLED    "${{ secrets.INTENT_ALERTS_ENABLED }}"
          put_secret MAKE_DIAGNOSTICO_WEBHOOK "${{ secrets.MAKE_DIAGNOSTICO_WEBHOOK }}"
          put_secret GA_MEASUREMENT_ID        "${{ secrets.GA_MEASUREMENT_ID }}"
          put_secret GOOGLE_SHEETS_ID         "${{ secrets.GOOGLE_SHEETS_ID }}"
          put_secret GOOGLE_SERVICE_ACCOUNT_EMAIL "${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}"
          put_secret GOOGLE_PRIVATE_KEY       "${{ secrets.GOOGLE_PRIVATE_KEY }}"
          put_secret GOOGLE_CALENDAR_ID       "${{ secrets.GOOGLE_CALENDAR_ID }}"
